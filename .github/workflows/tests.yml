name: Tests

on:
  push:
    branches: ['typescript']
  pull_request:
    branches: ['typescript']

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
